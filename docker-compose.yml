services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.10
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
      DISABLE_CLUSTER: "true"
      # Docker Desktop / some networks: memberlist cannot infer a private IP; without this Weaviate exits and :8080 never listens.
      CLUSTER_ADVERTISE_ADDR: "127.0.0.1"
    volumes:
      - weaviate_data:/var/lib/weaviate

volumes:
  weaviate_data:
